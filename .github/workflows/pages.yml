name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          mkdir -p _site
          cp index.html _site/
          [ -f i18n.js ] && cp i18n.js _site/
          # custom domain for GitHub Pages
          if [ -f CNAME ]; then cp CNAME _site/; else echo "shop.weareworld.ccwu.cc" > _site/CNAME; fi
          [ -f qrcode.png ] && cp qrcode.png _site/ || true
          # video notes + downloads
          if [ -d videos ]; then cp -R videos _site/; fi
          if [ -d downloads ]; then cp -R downloads _site/; fi
          # optional brand assets (logos etc.)
          if [ -d assets ]; then cp -R assets _site/; fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
