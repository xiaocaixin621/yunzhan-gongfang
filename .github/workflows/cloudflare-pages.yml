name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html i18n.js _site/
          [ -d videos ] && cp -R videos _site/
          [ -d downloads ] && cp -R downloads _site/
          [ -d assets ] && cp -R assets _site/
          # Cloudflare uses its own custom domain settings; do not ship GitHub CNAME
          find _site -type f | head -50

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=yunzhan-gongfang --branch=main
